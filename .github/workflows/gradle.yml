# Compila o projeto com Gradle (TeaVM → HTML/WebAssembly) e publica em GitHub Pages.
# Requisito no repositório: Settings → Pages → Build and deployment → Source: GitHub Actions.
# URL típica: https://<usuario>.github.io/<repositorio>/

name: Java CI with Gradle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 20
        uses: actions/setup-java@v4
        with:
          java-version: "20"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build TeaVM web bundle
        run: ./gradlew :teavm:build

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          # Saída do TeaVM: index.html e assets ficam em webapp/
          path: teavm/build/dist/webapp

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
